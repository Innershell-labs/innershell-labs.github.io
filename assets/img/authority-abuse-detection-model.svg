<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Authority Abuse Detection Model</title>
  <desc id="desc">A clean detection model showing how a valid identity can produce suspicious authority-use signals.</desc>
  <defs>
    <style>
      .h1{font-family:Inter,Arial,sans-serif;font-size:34px;font-weight:900;fill:#090b0f}
      .h2{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:850;fill:#090b0f}
      .h2w{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:850;fill:#fff}
      .body{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#656b78}
      .bodyw{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#c9ced8}
      .signal{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:850;fill:#090b0f}
      .signalSub{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:700;fill:#656b78}
      .tag{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:850;fill:#fff}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".09"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="#f6f5f2"/>
  <g opacity=".55" stroke="#e8e4da" stroke-width="1">
    <path d="M0 80h1400M0 160h1400M0 240h1400M0 320h1400M0 400h1400M0 480h1400M0 560h1400M0 640h1400M0 720h1400"/>
    <path d="M80 0v820M160 0v820M240 0v820M320 0v820M400 0v820M480 0v820M560 0v820M640 0v820M720 0v820M800 0v820M880 0v820M960 0v820M1040 0v820M1120 0v820M1200 0v820M1280 0v820"/>
  </g>

  <rect x="84" y="84" width="1232" height="652" rx="24" fill="#fff" filter="url(#shadow)"/>

  <text x="132" y="146" class="h1">Authority abuse detection model</text>
  <text x="132" y="184" class="body">The login can look normal while the use of authority becomes abnormal.</text>

  <g transform="translate(132 252)">
    <rect width="260" height="260" rx="18" fill="#090b0f"/>
    <circle cx="130" cy="86" r="48" fill="#fff"/>
    <circle cx="130" cy="68" r="15" fill="#090b0f"/>
    <path d="M100 114c9-18 19-27 30-27s21 9 30 27" fill="none" stroke="#090b0f" stroke-width="8" stroke-linecap="round"/>
    <text x="130" y="172" text-anchor="middle" class="h2w">Valid identity</text>
    <text x="130" y="210" text-anchor="middle" class="bodyw">authentication</text>
    <text x="130" y="236" text-anchor="middle" class="bodyw">looks correct</text>
  </g>

  <g transform="translate(454 252)">
    <rect width="260" height="260" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <rect x="74" y="48" width="112" height="96" rx="14" fill="#090b0f"/>
    <path d="M96 78h68M96 106h48" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <path d="M92 160h76" stroke="#e1191d" stroke-width="9" stroke-linecap="round"/>
    <text x="130" y="198" text-anchor="middle" class="h2">Allowed action</text>
    <text x="130" y="232" text-anchor="middle" class="body">request is permitted</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M402 382h42" stroke="#090b0f" stroke-width="8"/>
    <path d="M428 358l28 24-28 24" stroke="#090b0f" stroke-width="8"/>
    <path d="M724 382h42" stroke="#e1191d" stroke-width="8"/>
    <path d="M750 358l28 24-28 24" stroke="#e1191d" stroke-width="8"/>
  </g>

  <g transform="translate(786 236)">
    <rect width="452" height="430" rx="18" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
    <text x="226" y="48" text-anchor="middle" class="h2">Suspicious authority-use signals</text>

    <g transform="translate(34 82)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Volume</text>
      <text x="62" y="64" class="signalSub">many records</text>
    </g>

    <g transform="translate(238 82)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Scope</text>
      <text x="62" y="64" class="signalSub">new resources</text>
    </g>

    <g transform="translate(34 194)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Tenant</text>
      <text x="62" y="64" class="signalSub">boundary probes</text>
    </g>

    <g transform="translate(238 194)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Workflow</text>
      <text x="62" y="64" class="signalSub">high impact</text>
    </g>

    <g transform="translate(34 306)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Service</text>
      <text x="62" y="64" class="signalSub">unusual path</text>
    </g>

    <g transform="translate(238 306)">
      <rect width="180" height="88" rx="14" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="34" cy="44" r="12" fill="#e1191d"/>
      <text x="62" y="39" class="signal">Context</text>
      <text x="62" y="64" class="signalSub">new location</text>
    </g>
  </g>

  <g transform="translate(238 590)">
    <rect width="640" height="62" rx="31" fill="#090b0f"/>
    <text x="320" y="40" text-anchor="middle" class="tag">Detection should evaluate behavior, not only authentication state.</text>
  </g>
</svg>
