<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Incident Analysis Three Layers</title>
  <desc id="desc">Three incident-analysis layers: identity acquisition, authority expansion, and impact realization.</desc>
  <defs>
    <style>
      .head{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:850;fill:#090b0f}
      .item{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:750;fill:#242832}
      .num{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:900;fill:#fff}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="#f6f5f2"/>
  <g transform="translate(98 112)" filter="url(#shadow)">
    <rect width="1204" height="596" rx="24" fill="#fff"/>
  </g>

  <g transform="translate(150 186)">
    <rect width="330" height="410" rx="20" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <circle cx="52" cy="58" r="28" fill="#090b0f"/>
    <text x="52" y="66" text-anchor="middle" class="num">1</text>
    <text x="98" y="54" class="head">Identity</text>
    <text x="98" y="88" class="head">acquisition</text>
    <path d="M46 142h238" stroke="#d9d6ce" stroke-width="2"/>
    <g transform="translate(46 178)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">phishing</text>
    </g>
    <g transform="translate(46 238)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">stolen session</text>
    </g>
    <g transform="translate(46 298)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">exposed API key</text>
    </g>
  </g>

  <g transform="translate(535 186)">
    <rect width="330" height="410" rx="20" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
    <circle cx="52" cy="58" r="28" fill="#e1191d"/>
    <text x="52" y="66" text-anchor="middle" class="num">2</text>
    <text x="98" y="54" class="head">Authority</text>
    <text x="98" y="88" class="head">expansion</text>
    <path d="M46 142h238" stroke="#e1191d" stroke-width="2" opacity=".35"/>
    <g transform="translate(46 178)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">tenant access</text>
    </g>
    <g transform="translate(46 238)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">workflow trigger</text>
    </g>
    <g transform="translate(46 298)">
      <rect width="238" height="42" rx="21" fill="#fff"/>
      <text x="119" y="27" text-anchor="middle" class="item">service trust</text>
    </g>
  </g>

  <g transform="translate(920 186)">
    <rect width="330" height="410" rx="20" fill="#090b0f"/>
    <circle cx="52" cy="58" r="28" fill="#e1191d"/>
    <text x="52" y="66" text-anchor="middle" class="num">3</text>
    <text x="98" y="54" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="850" fill="#fff">Impact</text>
    <text x="98" y="88" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="850" fill="#fff">realization</text>
    <path d="M46 142h238" stroke="#fff" stroke-width="2" opacity=".2"/>
    <g transform="translate(46 178)">
      <rect width="238" height="42" rx="21" fill="#242832"/>
      <text x="119" y="27" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="750" fill="#fff">data exposure</text>
    </g>
    <g transform="translate(46 238)">
      <rect width="238" height="42" rx="21" fill="#242832"/>
      <text x="119" y="27" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="750" fill="#fff">fraud action</text>
    </g>
    <g transform="translate(46 298)">
      <rect width="238" height="42" rx="21" fill="#242832"/>
      <text x="119" y="27" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="750" fill="#fff">persistence</text>
    </g>
  </g>

  <path d="M492 391h32M877 391h32" stroke="#e1191d" stroke-width="8" stroke-linecap="round"/>
  <path d="M510 367l28 24-28 24M895 367l28 24-28 24" fill="none" stroke="#e1191d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
