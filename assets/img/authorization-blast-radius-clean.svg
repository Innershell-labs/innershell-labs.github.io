<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Authorization Blast Radius Map</title>
  <desc id="desc">A clean visual map showing identity context at the edge and authority propagation across internal system components.</desc>
  <defs>
    <style>
      .panel-title{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:900;fill:#090b0f}
      .panel-title-white{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:900;fill:#fff}
      .muted{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#656b78}
      .muted-white{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#c9ced8}
      .card-title{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:850;fill:#090b0f}
      .card-sub{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:700;fill:#656b78}
      .footer{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:850;fill:#fff}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".09"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="#f6f5f2"/>
  <g opacity=".55" stroke="#e8e4da" stroke-width="1">
    <path d="M0 80h1400M0 160h1400M0 240h1400M0 320h1400M0 400h1400M0 480h1400M0 560h1400M0 640h1400M0 720h1400"/>
    <path d="M80 0v820M160 0v820M240 0v820M320 0v820M400 0v820M480 0v820M560 0v820M640 0v820M720 0v820M800 0v820M880 0v820M960 0v820M1040 0v820M1120 0v820M1200 0v820M1280 0v820"/>
  </g>

  <rect x="84" y="84" width="1232" height="652" rx="24" fill="#fff" filter="url(#shadow)"/>

  <g transform="translate(132 180)">
    <rect width="300" height="428" rx="22" fill="#090b0f"/>
    <text x="150" y="70" text-anchor="middle" class="panel-title-white">Identity context</text>
    <text x="150" y="104" text-anchor="middle" class="muted-white">validated at the edge</text>

    <circle cx="150" cy="206" r="64" fill="#fff"/>
    <circle cx="150" cy="182" r="19" fill="#090b0f"/>
    <path d="M108 242c12-25 26-37 42-37s30 12 42 37" fill="none" stroke="#090b0f" stroke-width="10" stroke-linecap="round"/>
    <path d="M105 316l32 32 76-84" fill="none" stroke="#e1191d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="62" y="362" width="176" height="42" rx="21" fill="#242832"/>
    <text x="150" y="389" text-anchor="middle" class="muted-white">valid session</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M456 394h76" stroke="#e1191d" stroke-width="10"/>
    <path d="M510 362l38 32-38 32" stroke="#e1191d" stroke-width="10"/>
  </g>

  <g transform="translate(556 154)">
    <rect width="720" height="480" rx="22" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
    <text x="360" y="66" text-anchor="middle" class="panel-title">Authority path</text>
    <text x="360" y="100" text-anchor="middle" class="muted">impact is decided by downstream decisions</text>

    <g stroke="#d9b8b8" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M178 214h92"/>
      <path d="M450 214h92"/>
      <path d="M584 258v66"/>
      <path d="M542 366h-92"/>
      <path d="M270 366h-92"/>
    </g>

    <g transform="translate(56 154)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#090b0f"/>
      <text x="84" y="49" text-anchor="middle" class="footer">edge</text>
      <text x="84" y="88" text-anchor="middle" class="card-title">Gateway</text>
    </g>

    <g transform="translate(276 154)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#090b0f"/>
      <text x="84" y="49" text-anchor="middle" class="footer">logic</text>
      <text x="84" y="82" text-anchor="middle" class="card-title">App</text>
      <text x="84" y="106" text-anchor="middle" class="card-title">service</text>
    </g>

    <g transform="translate(496 154)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#090b0f"/>
      <text x="84" y="49" text-anchor="middle" class="footer">rules</text>
      <text x="84" y="82" text-anchor="middle" class="card-title">Policy</text>
      <text x="84" y="106" text-anchor="middle" class="card-title">engine</text>
    </g>

    <g transform="translate(496 320)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#e1191d"/>
      <text x="84" y="49" text-anchor="middle" class="footer">async</text>
      <text x="84" y="88" text-anchor="middle" class="card-title">Worker</text>
    </g>

    <g transform="translate(276 320)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#e1191d"/>
      <text x="84" y="49" text-anchor="middle" class="footer">state</text>
      <text x="84" y="82" text-anchor="middle" class="card-title">Message</text>
      <text x="84" y="106" text-anchor="middle" class="card-title">queue</text>
    </g>

    <g transform="translate(56 320)">
      <rect width="168" height="120" rx="16" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
      <rect x="28" y="26" width="112" height="34" rx="17" fill="#e1191d"/>
      <text x="84" y="49" text-anchor="middle" class="footer">impact</text>
      <text x="84" y="82" text-anchor="middle" class="card-title">Data</text>
      <text x="84" y="106" text-anchor="middle" class="card-title">access</text>
    </g>
  </g>

  <g transform="translate(300 676)">
    <rect width="800" height="46" rx="23" fill="#090b0f"/>
    <text x="400" y="30" text-anchor="middle" class="footer">The boundary of impact sits inside the system, not only at the login.</text>
  </g>
</svg>
