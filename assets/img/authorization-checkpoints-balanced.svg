<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Authorization Checkpoints</title>
  <desc id="desc">Balanced diagram showing five authorization checkpoints across a request lifecycle.</desc>
  <defs>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:28px;font-weight:850;fill:#090b0f}
      .sub{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:700;fill:#656b78}
      .num{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:900;fill:#fff}
      .banner{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:850;fill:#fff}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".09"/>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="#f6f5f2"/>
  <rect x="86" y="86" width="1228" height="648" rx="24" fill="#fff" filter="url(#shadow)"/>

  <g transform="translate(118 170)">
    <g>
      <rect width="210" height="300" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="42" cy="42" r="22" fill="#090b0f"/>
      <text x="42" y="49" text-anchor="middle" class="num">1</text>
      <circle cx="105" cy="106" r="42" fill="#090b0f"/>
      <circle cx="105" cy="90" r="14" fill="#fff"/>
      <path d="M78 126c8-17 18-25 27-25s19 8 27 25" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <text x="105" y="200" text-anchor="middle" class="title">Request</text>
      <text x="105" y="238" text-anchor="middle" class="sub">session</text>
      <text x="105" y="266" text-anchor="middle" class="sub">token claims</text>
    </g>

    <g transform="translate(246 0)">
      <rect width="210" height="300" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="42" cy="42" r="22" fill="#090b0f"/>
      <text x="42" y="49" text-anchor="middle" class="num">2</text>
      <rect x="61" y="66" width="88" height="82" rx="12" fill="#090b0f"/>
      <path d="M78 92h54M78 116h38" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <text x="105" y="200" text-anchor="middle" class="title">Service</text>
      <text x="105" y="238" text-anchor="middle" class="sub">role</text>
      <text x="105" y="266" text-anchor="middle" class="sub">tenant</text>
    </g>

    <g transform="translate(492 0)">
      <rect width="210" height="300" rx="18" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
      <circle cx="42" cy="42" r="22" fill="#e1191d"/>
      <text x="42" y="49" text-anchor="middle" class="num">3</text>
      <rect x="61" y="66" width="88" height="82" rx="12" fill="#e1191d"/>
      <path d="M78 92h54M78 116h34" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <circle cx="149" cy="148" r="14" fill="#090b0f"/>
      <text x="105" y="200" text-anchor="middle" class="title">Job</text>
      <text x="105" y="238" text-anchor="middle" class="sub">preserve</text>
      <text x="105" y="266" text-anchor="middle" class="sub">context</text>
    </g>

    <g transform="translate(738 0)">
      <rect width="210" height="300" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
      <circle cx="42" cy="42" r="22" fill="#090b0f"/>
      <text x="42" y="49" text-anchor="middle" class="num">4</text>
      <path d="M67 92c0-22 76-22 76 0v44c0 22-76 22-76 0z" fill="none" stroke="#090b0f" stroke-width="8"/>
      <path d="M67 92c0 22 76 22 76 0M67 116c0 22 76 22 76 0" fill="none" stroke="#090b0f" stroke-width="7"/>
      <text x="105" y="200" text-anchor="middle" class="title">Data</text>
      <text x="105" y="238" text-anchor="middle" class="sub">ownership</text>
      <text x="105" y="266" text-anchor="middle" class="sub">boundary</text>
    </g>

    <g transform="translate(984 0)">
      <rect width="210" height="300" rx="18" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
      <circle cx="42" cy="42" r="22" fill="#e1191d"/>
      <text x="42" y="49" text-anchor="middle" class="num">5</text>
      <rect x="66" y="76" width="78" height="70" rx="10" fill="none" stroke="#e1191d" stroke-width="8"/>
      <path d="M82 100h46M82 122h28" stroke="#e1191d" stroke-width="7" stroke-linecap="round"/>
      <text x="105" y="200" text-anchor="middle" class="title">Download</text>
      <text x="105" y="238" text-anchor="middle" class="sub">point-of-use</text>
      <text x="105" y="266" text-anchor="middle" class="sub">re-check</text>
    </g>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M336 320h28M582 320h28M828 320h28M1074 320h28" stroke="#090b0f" stroke-width="8"/>
    <path d="M348 298l26 22-26 22M594 298l26 22-26 22M840 298l26 22-26 22M1086 298l26 22-26 22" stroke="#090b0f" stroke-width="8"/>
  </g>

  <rect x="220" y="588" width="960" height="70" rx="35" fill="#090b0f"/>
  <text x="700" y="632" text-anchor="middle" class="banner">Re-check authority where user intent becomes system impact.</text>
</svg>
