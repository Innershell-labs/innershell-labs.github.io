<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">SaaS Export Context Risk</title>
  <desc id="desc">A balanced multi-tenant SaaS export diagram with readable labels and no overlapping text.</desc>
  <defs>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:27px;font-weight:850;fill:#090b0f}
      .sub{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:700;fill:#656b78}
      .warn{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:850;fill:#e1191d}
      .darkTitle{font-family:Inter,Arial,sans-serif;font-size:23px;font-weight:850;fill:#fff}
      .darkSub{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:700;fill:#c9ced8}
      .step{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:900;fill:#656b78}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".09"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="#f6f5f2"/>
  <rect x="86" y="86" width="1228" height="648" rx="24" fill="#fff" filter="url(#shadow)"/>

  <g transform="translate(126 156)">
    <rect width="280" height="430" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <text x="140" y="58" text-anchor="middle" class="title">Tenant A</text>
    <circle cx="140" cy="134" r="46" fill="#090b0f"/>
    <circle cx="140" cy="116" r="15" fill="#fff"/>
    <path d="M110 160c9-18 19-27 30-27s21 9 30 27" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <rect x="58" y="238" width="164" height="82" rx="12" fill="#fff" stroke="#090b0f" stroke-width="4"/>
    <text x="140" y="273" text-anchor="middle" class="sub">requested</text>
    <text x="140" y="299" text-anchor="middle" class="sub">report</text>
    <text x="140" y="370" text-anchor="middle" class="sub">user + tenant</text>
    <text x="140" y="397" text-anchor="middle" class="sub">context</text>
  </g>

  <g transform="translate(470 156)">
    <rect width="460" height="430" rx="18" fill="#fff" stroke="#d9d6ce" stroke-width="2"/>
    <text x="230" y="58" text-anchor="middle" class="title">Export pipeline</text>

    <g transform="translate(54 102)">
      <rect width="352" height="62" rx="12" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
      <text x="42" y="40" text-anchor="middle" class="step">1</text>
      <text x="190" y="40" text-anchor="middle" class="title">API validates token</text>
    </g>

    <g transform="translate(54 184)">
      <rect width="352" height="62" rx="12" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
      <text x="42" y="40" text-anchor="middle" class="step">2</text>
      <text x="190" y="40" text-anchor="middle" class="title">Job is queued</text>
    </g>

    <g transform="translate(54 266)">
      <rect width="352" height="62" rx="12" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
      <text x="42" y="40" text-anchor="middle" class="warn">3</text>
      <text x="190" y="40" text-anchor="middle" class="title">Context weakens</text>
    </g>

    <g transform="translate(54 348)">
      <rect width="352" height="62" rx="12" fill="#090b0f"/>
      <text x="42" y="40" text-anchor="middle" class="darkSub">4</text>
      <text x="190" y="30" text-anchor="middle" class="darkTitle">Worker uses</text>
      <text x="190" y="52" text-anchor="middle" class="darkTitle">broad role</text>
    </g>
  </g>

  <g transform="translate(994 156)">
    <rect width="280" height="430" rx="18" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
    <text x="140" y="58" text-anchor="middle" class="title">Tenant B</text>
    <circle cx="140" cy="150" r="58" fill="none" stroke="#e1191d" stroke-width="5" opacity=".35"/>
    <circle cx="140" cy="150" r="24" fill="#e1191d"/>
    <rect x="58" y="238" width="164" height="82" rx="12" fill="#fff" stroke="#e1191d" stroke-width="4"/>
    <text x="140" y="273" text-anchor="middle" class="warn">exposed</text>
    <text x="140" y="299" text-anchor="middle" class="warn">data</text>
    <text x="140" y="370" text-anchor="middle" class="warn">boundary</text>
    <text x="140" y="397" text-anchor="middle" class="warn">crossed</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M414 374h48M938 374h48" stroke="#090b0f" stroke-width="8"/>
    <path d="M442 350l28 24-28 24M966 350l28 24-28 24" stroke="#090b0f" stroke-width="8"/>
  </g>

  <rect x="382" y="632" width="636" height="74" rx="24" fill="#fff0f0" stroke="#e1191d" stroke-width="2"/>
  <text x="700" y="660" text-anchor="middle" class="warn">Background execution can outlive</text>
  <text x="700" y="686" text-anchor="middle" class="warn">and amplify the original request.</text>
</svg>
