<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Valid Identity Impact Path</title>
  <desc id="desc">A clean, symmetrical diagram showing how valid identity can lead to impact through authority, delegation, and weak constraints.</desc>
  <defs>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-size:26px;font-weight:850;fill:#090b0f}
      .sub{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:700;fill:#656b78}
      .chip{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:850;fill:#fff}
      .num{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:900;fill:#fff}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#090b0f" flood-opacity=".09"/>
    </filter>
  </defs>
  <rect width="1400" height="820" fill="#f6f5f2"/>
  <rect x="86" y="86" width="1228" height="648" rx="24" fill="#fff" filter="url(#shadow)"/>

  <g transform="translate(100 168)">
    <rect width="240" height="288" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <circle cx="120" cy="84" r="48" fill="#090b0f"/>
    <circle cx="120" cy="65" r="16" fill="#fff"/>
    <path d="M88 108c10-20 20-30 32-30s22 10 32 30" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <circle cx="42" cy="42" r="22" fill="#090b0f"/><text x="42" y="49" text-anchor="middle" class="num">1</text>
    <text x="120" y="190" text-anchor="middle" class="label">Valid identity</text>
    <text x="120" y="226" text-anchor="middle" class="sub">accepted session</text>
    <text x="120" y="252" text-anchor="middle" class="sub">trusted token</text>
  </g>

  <g transform="translate(420 168)">
    <rect width="240" height="288" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <circle cx="120" cy="84" r="18" fill="#e1191d"/>
    <circle cx="120" cy="84" r="54" fill="none" stroke="#e1191d" stroke-width="5" opacity=".35"/>
    <circle cx="120" cy="84" r="78" fill="none" stroke="#e1191d" stroke-width="5" opacity=".16"/>
    <circle cx="42" cy="42" r="22" fill="#090b0f"/><text x="42" y="49" text-anchor="middle" class="num">2</text>
    <text x="120" y="190" text-anchor="middle" class="label">Authority</text>
    <text x="120" y="226" text-anchor="middle" class="sub">roles, scopes</text>
    <text x="120" y="252" text-anchor="middle" class="sub">tenant access</text>
  </g>

  <g transform="translate(740 168)">
    <rect width="240" height="288" rx="18" fill="#f6f5f2" stroke="#d9d6ce" stroke-width="2"/>
    <rect x="68" y="46" width="104" height="76" rx="12" fill="#090b0f"/>
    <path d="M88 72h64M88 96h42" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <path d="M76 130h88" stroke="#e1191d" stroke-width="8" stroke-linecap="round"/>
    <circle cx="42" cy="42" r="22" fill="#090b0f"/><text x="42" y="49" text-anchor="middle" class="num">3</text>
    <text x="120" y="190" text-anchor="middle" class="label">Delegation</text>
    <text x="120" y="226" text-anchor="middle" class="sub">jobs, services</text>
    <text x="120" y="252" text-anchor="middle" class="sub">background flows</text>
  </g>

  <g transform="translate(1060 168)">
    <rect width="240" height="288" rx="18" fill="#fff0f0" stroke="#e1191d" stroke-width="3"/>
    <rect x="70" y="50" width="100" height="72" rx="10" fill="#e1191d"/>
    <path d="M90 74h60M90 98h36" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="170" cy="122" r="15" fill="#090b0f"/>
    <circle cx="42" cy="42" r="22" fill="#e1191d"/><text x="42" y="49" text-anchor="middle" class="num">4</text>
    <text x="120" y="190" text-anchor="middle" class="label">Impact</text>
    <text x="120" y="226" text-anchor="middle" class="sub">data exposure</text>
    <text x="120" y="252" text-anchor="middle" class="sub">workflow abuse</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M350 312h60M670 312h60M990 312h60" stroke="#090b0f" stroke-width="8"/>
    <path d="M392 288l28 24-28 24M712 288l28 24-28 24M1032 288l28 24-28 24" stroke="#090b0f" stroke-width="8"/>
  </g>

  <g transform="translate(180 572)">
    <rect width="1040" height="76" rx="18" fill="#090b0f"/>
    <text x="52" y="48" class="chip">Blast-radius reducers</text>
    <g transform="translate(335 18)">
      <rect width="146" height="40" rx="20" fill="#242832"/><text x="73" y="26" text-anchor="middle" class="chip">least privilege</text>
    </g>
    <g transform="translate(510 18)">
      <rect width="134" height="40" rx="20" fill="#242832"/><text x="67" y="26" text-anchor="middle" class="chip">re-checks</text>
    </g>
    <g transform="translate(675 18)">
      <rect width="132" height="40" rx="20" fill="#242832"/><text x="66" y="26" text-anchor="middle" class="chip">revocation</text>
    </g>
    <g transform="translate(838 18)">
      <rect width="132" height="40" rx="20" fill="#e1191d"/><text x="66" y="26" text-anchor="middle" class="chip">detection</text>
    </g>
  </g>
</svg>
